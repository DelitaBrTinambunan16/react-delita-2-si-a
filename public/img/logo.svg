<svg width="420" height="140" viewBox="0 0 420 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="4" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="#000"></rect>

  <text x="50%" y="55%" text-anchor="middle" font-size="48" font-family="Poppins, Arial, sans-serif" fill="#00ffff" filter="url(#neonGlow)">
        NEON UI
  </text>

  <line x1="110" y1="95" x2="310" y2="95" stroke="#00ffff" stroke-width="3" filter="url(#neonGlow)"></line>
</svg>